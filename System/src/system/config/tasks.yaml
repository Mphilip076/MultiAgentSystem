research_task:
  description: >
    Research the following news event: {topic} - {news_item}. 
    Focus strictly on recent developments, market reactions, and related announcements to expand upon the provided article. Avoid relying on outdated historical data.
  expected_output: >
    A detailed research dossier formatted as structured notes. It must include the company name, date, and a bibliography.
    The original URL from `news_item` MUST be Source #1 in the bibliography. Use exact, unaltered URLs for all other sources.
  agent: researcher

data_validation_task:
  description: >
    Fact-check the researcher's dossier regarding {news_item}. Eliminate any inaccuracies or logical inconsistencies.
    Use the URL Checker Tool to test EVERY link in the bibliography. Discard any sources that return a 404 or fail to connect.
  expected_output: >
    A fully vetted, fact-checked dossier. Ensure all remaining bibliography links are verified working URLs.
  agent: data_validator

report_creation_task:
  description: >
    Transform the validated dossier into a strategic report. Extract the relevant insights to populate the provided JSON schema fields.
    Keep the generated content highly concise and strictly to the point. Do not write extremely long paragraphs.
  expected_output: >
    A concise strategic report strictly structured as a valid JSON object matching the provided Pydantic schema. Include the numbered source list.
  agent: report_creator

report_validation_task:
  description: >
    Format the structured JSON report data into a polished Markdown document.
    You MUST use exactly these headers:
    # TITLE: [title]
    ## COMPANY: [company]
    ## DATE: [date]
    ## WHAT HAPPENED
    ## COMPETITIVE IMPACT
    ## WHY IT MATTERS
    ## TELL ME MORE
    ## OUTLOOK
    ## SOURCE INFORMATION
  expected_output: >
    The final, formatted Markdown report.
  agent: report_validator

send_report_task:
  description: >
    Extract the "SUBJECT:" line from the finalized report to use as the email subject.
    Populate the email body using this template: {template}.
    Execute the Email Sender Tool to deliver the report payload. You MUST provide all three arguments exactly:
    1. 'subject': The extracted subject string.
    2. 'email_body': The populated template string.
    3. 'report_content': The full, complete Markdown text of the finalized report.
  expected_output: >
    A confirmation string that the Email Sender Tool was successfully called.
  agent: send_report

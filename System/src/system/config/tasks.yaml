research_task:
  description: >
    You are given a recent news event about {topic}: {news_item}. 
    Use this event as a starting point to conduct deep, extensive research. 
    Find additional background, related announcements, and 
    market reactions to build a highly comprehensive view of the situation. 
    Focus ONLY on recent developments and the latest information surrounding the date of the news item. 
    It is extremely important that you anchor your analysis to the current news rather than 
    substituting it entirely with older context. Do not focus on outdated historical context 
    (e.g. data from 2023) unless strictly necessary for a brief mention. Do not just summarize 
    the provided article—expand upon it significantly with your own independent research tools.
  expected_output: >
    An extensive, highly detailed research dossier containing as much 
    information as possible about the event, its background, and its broader 
    strategic implications, formatted as comprehensive structured notes.
    You must include company name, date, and a structured bibliography or list of exact 
    URLs and sources used for your research so they can be referenced later.
    You must include the original URL provided in the `news_item` as Source #1 in your bibliography.
    For all other sources, you must use the EXACT, unaltered 'link' string provided by your search tool. 
    DO NOT hallucinate, guess, or modify the URLs in any way (especially do not change years/dates inside the URL strings).
  agent: researcher

data_validation_task:
  description: >
       Extract the single most important factual claim.
       Fact-check all data — remove hallucinations, inaccuracies, and inconsistencies.
       Run the URL Checker Tool on every link. Discard any source returning 404, invalid, or failed status.
       Score the source (1–5 each): authority, evidence_strength, transparency, recency, bias_risk.
       credibility_score_total = sum of five.
       Score the claim (0–2 each): direct_support, cross_verification, specificity, consistency.
       claim_verification_total = sum of four.
       Assign verification_status: verified | partially_verified | unverified.
       Assign report_worthiness_score: 1–5.
       Assign decision: pass | flag | reject.
       · pass: credibility_score_total >= 18 AND claim_verification_total >= 6 AND report_worthiness_score >= 3
       · flag: mixed or incomplete evidence
       · reject: low credibility, weak support, or not reportable
        RULES: Never invent facts. Be conservative on cross-verification. Return ONLY valid JSON.
  expected_output: >
    A vetted JSON audit object and a cleaned dossier with only validated sources, ready for report generation.
  agent: data_validator

report_creation_task:
  description: >
    Review the heavily detailed and validated context and transform it into a 
    highly comprehensive, full-length strategic report.
    You MUST structure the report by extracting and populating the provided JSON schema fields 
    (title, company, date, what_happened, competitive_impact, why_it_matters, tell_me_more, outlook, source_information) 
    with detailed content. Make sure to capture a numbered list of all sources and exact URLs for the source_information field.
  expected_output: >
    A comprehensive strategic report strictly structured as a valid JSON object matching the provided Pydantic schema. 
    Do not use markdown bolding markers (**) inside the content paragraphs.
  agent: report_creator

report_validation_task:
  description: >
    Review the generated structural JSON report data for structural integrity, logical flow,
    formatting consistency, and professional tone. Ensure that the original vetted facts
    were strictly adhered to without being altered to sound better. Verify that the 
    bibliography contains the FULL exact URLs and links for all sources exactly as they were found.
    You MUST transform the validated report data into a well-formatted Markdown document.
    Use exactly the following headers:
    # TITLE: [title]
    ## COMPANY: [company]
    ## DATE: [date]
    ## WHAT HAPPENED
    ## COMPETITIVE IMPACT
    ## WHY IT MATTERS
    ## TELL ME MORE
    ## OUTLOOK
    ## SOURCE INFORMATION
  expected_output: >
    The final, polished and fully vetted version of the extensive report fully formatted as a Markdown document. 
    Ensure that exact URLs for all sources are preserved natively and fully functional.
  agent: report_validator

send_report_task:
  description: >
    Take the finalized and validated extensive report and prepare it for 
    professional delivery.
    The original report will contain a "SUBJECT:" line. You MUST extract this subject 
    line to use as the email subject.
    You must construct an email body strictly following the provided template: {template}. 
    Populate the template fields based on the most important strategic findings from the report.
    You MUST execute the Email Sender Tool to actually deliver the report. 
    Provide the extracted subject as the `subject` argument.
    Provide the populated template string as the `email_body` argument.
    Provide the entire original finalized report as the `report_content` argument to the tool.
  expected_output: >
    A confirmation string that the email tool was successfully called and the report was sent.
  agent: send_report

research_task:
  description: >
    Research the following news event: {topic} - {news_item}. 
    Focus strictly on recent developments, market reactions, and related announcements to expand upon the provided article. Avoid relying on outdated historical data.
    Limit your independent research to a maximum of 10 highly authoritative, complementary sources. Focus strictly on extracting extremely high-signal information 
    rather than drowning the dossier in volume.
  expected_output: >
    A research dossier formatted as structured notes. It must include the company name, date, and a bibliography.
    The original URL from `news_item` MUST be Source #1 in the bibliography. Use exact, unaltered URLs for all other sources.
  agent: researcher

data_validation_task:
  description: >
    Fact-check the researcher's dossier regarding {news_item}. Eliminate any inaccuracies or logical inconsistencies.
    Use the URL Checker Tool to test EVERY link in the bibliography. Discard any sources that return a 404 or fail to connect.
  expected_output: >
    A fully vetted, fact-checked dossier. Ensure all remaining bibliography links are verified working URLs.
  agent: data_validator

report_creation_task:
  description: >
    Transform the validated dossier into an strategic report for AbbVie.
    Extract the relevant insights to populate the provided JSON schema fields.
    
    Ensure you accurately populate the fields based on these instructions:
    - title: The title of the report. Remove 'Research Dossier:' from the title.
    - company: The name of the primary company involved (or source name if N/A).
    - drug: The specific drug, therapy, or product involved (or 'N/A' if not applicable).
    - date: The date of the event or report.
    - what_happened: A clear and concise summary of the core event or news.
    - impact_level: The assessed level of impact for AbbVie (e.g., 'High', 'Medium', or 'Low').
    - competitive_impact: Detailed analysis of how this impacts AbbVie from a Competitive Intelligence (CI) Point of View.
    - why_it_matters: Explanation of the strategic significance and alignment with company goals.
    - tell_me_more: The actual verified facts and detailed background context extracted from the validated data.
    - outlook: Actionable strategic recommendations, future outlook, and competitor activities to monitor.
    - source_information: A numbered list of all sources and exact URLs used.

    Keep the generated content highly concise and strictly to the point. 
    Each section (What happened, Competitive Impact, Why it matters, Tell me more, and Outlook) must consist of 3-5 bullet points max. 
    DO NOT generate long paragraphs. If your entire output takes more than 1 single page to read, you failed.
  expected_output: >
    A hyper-concise strategic report as a raw JSON object matching this exact structure:
    {
      "title": "String",
      "company": "String",
      "drug": "String",
      "date": "String",
      "what_happened": "String",
      "impact_level": "String",
      "competitive_impact": "String",
      "why_it_matters": "String",
      "tell_me_more": "String",
      "outlook": "String",
      "source_information": "String"
    }
  agent: report_creator

report_validation_task:
  description: >
    Format the structured JSON report data into a polished Markdown document.
    You MUST use exactly these headers and map the JSON fields as follows:
    ## TITLE: [title]
    ## COMPANY: [company]
    ## DRUG: [drug]
    ## DATE: [date]
    ## WHAT HAPPENED 
    (from the 'what_happened' field)
    ## IMPACT (CI PoV): [impact_level]
    (Insert the bullet points from the 'competitive_impact' field directly below this header)
    ## WHY IT MATTERS 
    (from the 'why_it_matters' field)
    ## TELL ME MORE
    (from the 'tell_me_more' field)
    ## OUTLOOK
    (from the 'outlook' field)
    ## SOURCES
    (from the 'source_information' field)

    Make sure each section (except for SOURCES) is formatted as 3-5 concise bullet points.
    CRITICAL: DO NOT add any extra content to the report. You must NOT append any metadata, 
    footers, or dialogue such as "VALIDATION SUMMARY" or "APPROVED FOR CLIENT DISTRIBUTION". 
    Output ONLY the raw Markdown document text and absolutely nothing else.
  expected_output: >
    The final, formatted Markdown report. No additional summaries or footers appended.
  agent: report_validator

send_report_task:
  description: >
    You are the final delivery step. You must execute the Email Sender Tool.
    You must provide TWO arguments to the tool exactly:
    1. 'subject': Extract the Subject/Title from the report.
    2. 'email_body': Populate this text template exactly: {template}
    Do NOT attempt to pass the full markdown report as a parameter. The tool will automatically read the full report directly from disk.
  expected_output: >
    A confirmation string that the Email Sender Tool was successfully called.
  agent: send_report
